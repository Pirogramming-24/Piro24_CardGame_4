{% extends 'base.html' %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/game_attack.css' %}">

<div class="attack-main-frame">
    <h1 class="auth-title">ATTACK!!</h1>
    
    <form method="POST" action="{% url 'games:game_attack' %}" class="attack-form">
        {% csrf_token %}
        
        <div class="split-container">
            <div class="section left-area">
                <h2 class="section-label">공격할 카드를 선택하세요</h2>
                <div class="card-grid">
                    {% for card in random_cards %}
                    <label class="card-item">
                        <input type="radio" name="selected_card" value="{{ card }}">
                        <div class="card-box">
                            <span class="card-val">{{ card }}</span>
                            <img src="{% static 'images/hat_icon.png' %}" class="selection-hat" alt="hat">
                        </div>
                    </label>
                    {% endfor %}
                </div>
            </div>

            <div class="v-divider"></div>

            <div class="section right-area">
                <div>
                    <h2 class="section-label">공격할 상대를 선택하세요</h2>
                    <div class="select-container">
                        <select name="defender" class="pixel-select">
                            <option value="" disabled selected>상대를 고르세요</option>
                            {% for user in other_users %}
                            <option value="{{ user.id }}">{{ user.nickname }} ({{ user.points }} pts)</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <div class="attack-btn-box">
                    <button type="submit" class="btn-submit">Attack!</button>
                </div>
            </div>
        </div>
    </form>
</div>
{% endblock %}
