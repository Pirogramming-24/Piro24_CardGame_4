{% extends 'base.html' %}
{% load static %}

{% block content %}
<form method="POST" action="{% url 'games:game_attack' %}">
    {% csrf_token %}
    <div class="game-container">
        <div class="selection-section card-choice">
            <h2>공격할 카드를 선택하세요</h2>
            <div class="card-wrapper"> {% for card in random_cards %}
                <label class="card-item">
                    <input type="radio" name="selected_card" value="{{ card }}" required>
                    <div class="card-design">
                        <span class="card-number">{{ card }}</span>
                        <img src="{% static 'images/hat_icon.png' %}" class="deco-icon" alt="hat">
                    </div>
                </label>
                {% endfor %}
            </div>
        </div>

        <div class="selection-section defender-choice">
            <h2>공격할 상대를 선택하세요</h2>
            <select name="defender" class="custom-select" required>
                <option value="" disabled selected>상대를 고르세요</option>
                {% for user in other_users %}
                <option value="{{ user.id }}">{{ user.username }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="btn-attack">Attack!</button>
        </div>
    </div>
</form>
{% endblock %}
