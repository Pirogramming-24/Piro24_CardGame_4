{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Piro Card Match{% endblock %}</title>
    
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="main-background">

    <header class="nav-bar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="{% url 'games:main_list' %}">Piro Card Match</a>
            </div>

            <nav class="nav-links">
                {% if user.is_authenticated %}
                    <a href="{% url 'games:game_attack' %}">게임하기</a>
                    <a href="{% url 'games:ranking' %}">랭킹보기</a>
                    
                    <a href="#">로그아웃</a>
                    {% else %}
                    {% endif %}
            </nav>
        </div>
    </header>

    <main class="content-wrapper">
        {% block content %}
        {% endblock %}
    </main>

    <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
