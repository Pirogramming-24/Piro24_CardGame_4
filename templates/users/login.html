<!-- 로그인 페이지 -->

<!--회원가입 폼 등에서 input 태그의 namge 속성을 임의로 username, password, nickname 등으로 적은거
views.py에서 받는 변수명이랑 똑같은지 확인해야함 ++ 이거 말씀 드렸음.-->

{% extends 'base.html' %}
{% load static %}

{% block title %}로그인 - Piro Card Match{% endblock %}

{% block content %}

<link rel="stylesheet" href="{% static 'css/login.css' %}">

<div class="main-container">
    <div class="auth-box login-box"> 
        <h1 class="auth-title">Login</h1>
        
        <form method="POST" action="" class="auth-form">
            {% csrf_token %}
            
            <div class="input-area">
                <div class="input-group">
                    <label for="id_username">ID</label>
                    <input type="text" name="username" id="id_username">
                </div>

                <div class="input-group">
                    <label for="id_password">PW</label>
                    <input type="password" name="password" id="id_password">
                </div>
            </div>

            <div class="social-login-group">
                <a href="{% url 'users:naver' %}" class="btn-social btn-naver">Naver로 로그인</a> <!--여기 링크들 다 소셜로그인url 나오면 바꿔야함 ++얘도 말씀 드림-->
                <a href="{% url 'users:google' %}" class="btn-social btn-google">Google로 로그인</a>
                <a href="{% url 'users:kakao' %}" class="btn-social btn-kakao">카카오로 로그인</a>
            </div>

            <div class="btn-area">
                <button type="submit" class="btn-submit">로그인</button>
            </div>
            
        </form>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        
        // 1. 요소 찾기
        const loginForm = document.querySelector(".auth-form");
        const idInput = document.getElementById("id_username");
        const pwInput = document.getElementById("id_password");
        const submitBtn = document.querySelector(".btn-submit");

        // 2. 초기 상태: 버튼 비활성화
        if (submitBtn) {
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.5"; // 0.3은 너무 흐려서 0.5로 수정함!
            submitBtn.style.cursor = "not-allowed";
        }

        // 3. 입력 감지 함수
        function checkInputs() {
            const idValue = idInput.value.trim();
            const pwValue = pwInput.value.trim();

            if (idValue.length > 0 && pwValue.length > 0) {
                // 둘 다 입력되면 활성화 (진한 갈색)
                submitBtn.disabled = false;
                submitBtn.style.opacity = "1"; 
                submitBtn.style.cursor = "pointer";
                submitBtn.style.backgroundColor = "#935555"; 
            } else {
                // 하나라도 비면 비활성화 (흐린 갈색)
                submitBtn.disabled = true;
                submitBtn.style.opacity = "0.5"; 
                submitBtn.style.cursor = "not-allowed";
            }
        }

        // 4. 이벤트 연결 (타자 칠 때마다 감지)
        if (idInput && pwInput) {
            idInput.addEventListener("input", checkInputs);
            pwInput.addEventListener("input", checkInputs);
        }

        // 5. 제출 시 최종 방어 (엔터키 등)
        if (loginForm) {
            loginForm.addEventListener("submit", function(event) {
                if (idInput.value.trim() === "" || pwInput.value.trim() === "") {
                    event.preventDefault();
                    alert("아이디와 비밀번호를 모두 입력해주세요!");
                }
            });
        }
    });
</script>

{% endblock %}
