<!-- 로그인 페이지 -->
 
{% extends 'base.html' %}
{% load static %}

{% block title %}로그인 - Piro Card Match{% endblock %}

{% block content %}
<div class="main-container"> <div class="auth-box"> <h1 class="auth-title">Login</h1>
        
        <form method="POST" action="" class="auth-form">
            {% csrf_token %}
            
            <div class="input-group">
                <label for="id_username">ID</label>
                <input type="text" name="username" id="id_username" placeholder="아이디를 입력하세요">
            </div>

            <div class="input-group">
                <label for="id_password">PW</label>
                <input type="password" name="password" id="id_password" placeholder="비밀번호를 입력하세요">
            </div>

            <button type="submit" class="btn-submit">로그인</button>
        </form>

        <div class="social-login-group">
            <a href="#" class="btn-social btn-facebook">Facebook으로 로그인</a>
            <a href="#" class="btn-social btn-google">Google로 로그인</a>
            <a href="#" class="btn-social btn-kakao">카카오로 로그인</a>
        </div>
        
        <div class="auth-footer">
            <a href="{% url 'users:signup' %}">회원가입 하러가기</a>
        </div>

    </div>
</div>
{% endblock %}
