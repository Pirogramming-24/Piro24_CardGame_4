<!-- 회원가입 페이지 -->

{% extends 'base.html' %}
{% load static %}

{% block title %}회원가입 - Piro Card Match{% endblock %}

{% block content %}
<div class="main-container">
    
    <div class="auth-box">
        <h1 class="auth-title">Sign Up</h1>
        
        <form method="POST" action="" class="auth-form">
            {% csrf_token %}
            
            <div class="input-group">
                <label for="id_nickname" class="sr-only">Name</label> <input type="text" name="nickname" id="id_nickname" placeholder="USER NAME">
            </div>

            <div class="input-group">
                <label for="id_username" class="sr-only">ID</label>
                <input type="text" name="username" id="id_username" placeholder="ID">
            </div>

            <div class="input-group">
                <label for="id_password" class="sr-only">PW</label>
                <input type="password" name="password" id="id_password" placeholder="PW">
            </div>
            
            <div class="input-group">
                <label for="id_password_check" class="sr-only">PW Check</label>
                <input type="password" name="password_check" id="id_password_check" placeholder="PW 확인">
            </div> <!--비번 확인은 js로 틀렷다고 띄우기? 아니면 백엔드에서 검사해서 에러메세지 보내는방법도 있음 어케할지 논의하기-->

            <div class="btn-area">
                <button type="submit" class="btn-submit">회원가입</button>
            </div>
        </form>

    </div>
</div>
{% endblock %}
